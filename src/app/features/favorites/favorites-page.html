<section class="favorites">
  <h1 class="favorites__title">Favorites</h1>

  @if (photos().length === 0) {
    <p class="favorites__empty">No favorites yet. Tap photos in the stream to save them here.</p>
  } @else {
    <div class="favorites__grid">
      @for (photo of photos(); track photo.id) {
        <app-photo-card [photo]="photo" [favorited]="true" (select)="openPhoto($event)" />
      }
    </div>
  }
</section>
